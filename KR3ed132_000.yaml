body:
  text: 一頭方治頭上屑皮胡桃肉七個河子肉五個梨一個側柏葉三片共搗如泥水浸片時搽之又方白芷零陵香為細末摻頭上三五日篦去又方藁本白芷為細未晚塗頭上次早梳垢盡去治發落不生亂髮洗淨油煎焦細研為膏搽之又方青果五個訶子肉三錢官桂山奈樟腦各一錢香油二兩將藥入油內浸三日每早手蘸油擦三十六下日後無者生也又方鮮猴姜擦之或生薑浸油擦之治發少側柏葉陰乾為末和菜油塗之治發黃羊尿燒灰和臘豬脂塗之日三次候黑乃止又方陳醋煮黑豆汁染之治發短東行棗根三尺橫火爐上蒸之兩頭汗出敷發上治發亂鹿角菜熬成膠刷發上治發槁不潤澤木瓜浸油搽之令髮長黑香油煎桑葉去滓沐之治發好落胡桃肉二個棐子肉二個側柏葉一錢共為細末擦頭上或浸水擦頭亦可治少白頭黑芝麻九蒸九曬研細末棗肉為丸每服五錢開水送下又方枸杞子三兩柿餅五個酒浸煮爛同搗為丸如桐子大每服八十丸空心茅根湯下烏須方胡桃皮蝌蚪同搗如泥磁器盛之埋地下二十一日取出塗之又方百藥煎一兩針砂五錢蕎麥麵五錢先洗淨髮須從荷葉熬醋調刷再用荷葉包之次日洗去又方五倍子一個銅末一錢白及八分食鹽五分沒石子三分訶子肉三分細辛三分白礬三分黑礬六分共為細末熱茶調煮後入黑礬再煮至面上生光用搽鬚髮上油紙包立黑拔白生黑母丁香為末生薑汁調塗孔中即生黑者又方梧桐子搗汁塗孔中或豬膽汁塗孔中俱生黑者長鬚方鹿角尖二錢牙皂二錢皂刺二錢青果四兩燒灰存性橘子一枚取汁生薑取汁等分調勻入磁器內收貯用木塞口煮三柱香晚上用肥皂水洗淨短鬚用藥搽上天明洗去至四十九日須即長如欲再長再搽藥每日吃核桃一枚至二七日吃二枚至三七日吃三枚為例治眉毛不生半夏白芥子等分研細末生薑汁調擦又方黑芝麻花陰乾為末以黑芝麻油漬之日塗自生二面方梨花散治面黑白芷白及白丁香白茯苓白附子白殭蠶白蒺藜皂角去皮弦各等分共為細末加豆麵少許每日洗面用之桃花散密陀僧二兩塞水石一兩官粉五錢硃砂三錢銀硃三錢白及五錢麝香七分共為細末雞子清調盛磁器內用蜜封其口蒸熟曬乾再研極細末洗面用之八寶芙蓉散官粉一兩干胭脂八錢潮腦八錢元明粉四錢烏梅十個硃砂三錢川芎二錢洋糖二兩共為細末洗面用之仙光散三月三日採桃花七月七日收雞血和塗面上三二日脫下則顏色光華如仙玉光散兼治風刺梨花李花櫻桃花白菜花紅蓮花白蓮花旋花各六錢木瓜花桃花青木香廣木香丁香沉香覆鍾乳粉各三錢珍珠玉屑各二錢豆麵七合共為細末收放磁器內每日㾴靧用洗手面如玉丹兼治凍裂杏仁一兩花粉一兩棗肉十枚胰子三具共搗如泥好酒四盞浸於磁器中以潤面手玉鏡膏兼治渣鼻金色密陀僧二兩研極細末人乳調或蜂蜜調每晚蒸熱敷面上次早洗去治面黑冬瓜一個竹刀去皮切片燒酒一壺米水煮去渣熬成膏每夜塗之次早洗去治面上黯點白殭蠶一兩黑醜一兩細辛五錢共為細末煉蜜為丸洗數次自去又方元荽煎湯洗之自去治雀斑紫背浮萍白梅肉櫻桃枝牙皂等分共為細末煉蜜為丸洗面用之治汗斑官粉硫黃穿山甲共為細末用雙蒂秋茄蘸藥拭之又方密陀僧為末黃瓜蒂蘸藥拭之治紅斑鱔魚血塗之自去治面痣益母草灰和肥皂洗之治面上白駁白鱔魚脂一兩煎先刮駁上令燥疼以油塗之治面上皴裂豬蹄煮如膠臥時塗面次早洗去治面上皺裂桃仁為末豬脂熬數次夜臥塗之治面上凍瘡燒酒洗之或櫻桃汁拭之治抓破面皮輕粉研極細末生薑汁調敷無疤治面上瘢痕鷹尿白和人精塗之三日即光又方茯苓一兩杏仁一兩百部一兩香附一兩天冬一兩五冬瓜子二兩去皮茨菰根二兩瓜蔞二個甘草三兩豆麵六兩皂角一斤去皮弦清膠二兩酒炙益母草灰四兩米泔共搗成餅焙乾為細末每日洗面如藻豆用之又方馬齒莧熬水洗之又方雞蛋黃炒黑日三次拭塗之治刺瘊蜘蛛絲系根上自落治肉瘊天南星飛羅面等分研細末醋調搽之治肉瘤金鳳花科熬水洗之夏用鮮冬用干清肺飲治面上粉刺白芷川芎連翹黃連黃參川貝梔仁苦參荊芥甘草桑皮等分水煎臨臥時服升麻附子湯治面寒升麻七分附子七分炙耆七分葛根七分白芷七分黨參五分草蔻五分益智仁五分蓮鬚三分甘草五分蔥三寸水煎服升麻黃連湯治面熱升麻一錢五葛根一錢五蒼朮八分白芍七分黃連六分酒浸黃參六分酒浸犀角五分川芎四分荊芥三分薄荷三分白芷二分甘草五分水煎食後服除青散治面上字礦石灰一錢煉蓼灰一錢紫蓼灰一錢百草霜一錢黨參五錢共為細末水調寫字上有泥起拂去再寫三耳方聰耳用緑豆皮填枕頭常枕不生耳疾治耳聾大貓兒眼珍珠綿包塞耳內治水銀入耳用金銀著耳邊自出飛蛾入耳醬油灌耳中即出又方擊銅器於耳邊即出螞蟻入耳穿山甲焙為細末水調灌之即出蚰蜒入耳香油作煎餅枕臥自出又方活地龍一條納入蔥葉中化水滴耳內蚰蜒亦化成水蜈蚣入耳生薑汁或生韭汁滴耳內即出蛆蟲入耳杏仁搗汁滴耳內非出即死惡蟲入耳桃葉作枕枕之蟲自鼻出諸蟲入耳鮮雞冠血滴入即出又方好醋滴耳內即出又方貓尿滴耳內即出用生薑擦貓鼻自尿四目方明目枕黑豆皮緑豆皮蕎麥皮草決明菊花等分填枕頭常枕至老不生目疾又方皮硝六錢白水一盅半煎至七分每遇日期早晨洗一次不可間斷洗至三年有目疾者全愈無目疾分外光明千萬不可誤日期正月初一二月初一三月初四四月初十十三十月十三十一月初四十二月初四飛絲入目石葛蒲擂碎左目塞右鼻右目塞左鼻又方皺紗手帕包白菜揉汁滴入目即去麥芒入目大麥煮濃汁洗之即去竹木入目蠐螬搗爛塗之即出沙塵入目蜣螂一枚手持其背於目上影之塵沙自出雜物入目雞肝血滴目中即出又方木梳上垢為丸放眼角內即出五口方口乾黨參熟地天冬麥冬白芍五味子烏梅水煎服口酸柴胡膽草黃芩青皮水煎服口辛梔子桔梗黃芩桑皮天冬麥冬南沙參水煎服口苦生地天冬麥冬丹皮黃連知母甘草水煎服口甘黃芩白芍陳皮花粉梔子甘草水煎服口咸生地山藥茯苓洋瀉萸肉丹皮元參知母水煎服口臭生地石膏犀牛石斛枳殼茵陳枇杷葉竹葉水煎服七香丸紫蔻仁一兩藿香八錢黨參五錢桂心三錢香附四錢炒丁香二錢木香一錢五分共為細末煉蜜丸如桐子大噙口中化之出氣亦香獸骨鯁喉象牙磨水咽之即下牙笱牙梳皆可用又方狗涎滴耳中即下或含陳皮咽汁亦下魚骨鯁喉百合十兩研末蜜水調包圍頸項三五次即下又方貓涎滴口中即化為水或含硼砂亦化又方青果核煎水飲之即消骨刺入喉栗子內薄皮燒灰研極細末吹之即下又方鳳仙子研細末水調服諸骨皆化竹木入喉威靈仙紅糖等分醋煎飲之即消麥芒入喉飴糖嚼滿口咽之即下亂髮繞喉自己亂髮燒灰開水和服即消誤吞銅錢荸薺生食數十枚即化又方核桃多食幾枚亦化誤吞針蠶豆煮熟同韭菜食自下誤吞鐵栗木灰研極細末紅糖和服三錢即出誤吞金羊脛骨燒焦研細末米湯和服三錢即出誤吞金銀器陳大麥仁炒研作粉用紅糖拌之日食三次成碗三五日即下止可食米飯大葷不可飲湯水或多吃肥肉自能從大便出又方煉蜜服三升即出誤吞金銀錫銅紅糖一碗白糖一塊燒紅放入紅糖內共搗為膏多服自下又方砂仁煎濃汁服之其物自出誤吞水銀柴灰研極細末煎濃汁服誤吞鉛粉香油和蜂蜜服誤吞螞蝗此物最毒雖燒灰為末入水亦活惟入蜂蜜內即化成水誤吞者多食蜜可也誤吞蜈蚣急取生豬血喝之須臾以清油灌口中其蟲滾在血內即吐出再用雄黃米酒調服解其毒六齒方固齒石膏青鹽白礬等分共為細末指蘸擦牙齒少頃溫水漱口日三次不生齒疾無比散固牙齒烏鬚髮大熟地二兩砂仁炒地骨皮二兩蜜炙青鹽二兩炒沒石子四錢公母成對破故紙二錢酒炒細辛一錢五分酒洗共為細末每早擦牙良久白開水咽下白牙散治牙齒黑黃石膏二兩砂鍋二兩青鹽五錢白芷三錢零陵香二錢五分升麻二錢五分細辛一錢麝香五分共為細末每晨擦牙上溫水漱口吐出牙齒動搖白鹽末擦之用溫水含漱百遍五日內即牢固或內服還少丹或八味丸更良又方骨碎補一兩炒黑色為末揩牙根鹽水漱良久吐之又方牛齒煅為末擦之取二錢水煎熱漱冷吐日久自固牙齒漸長白朮為末開水和服更用白朮煮水灌漱自愈牙落重生雄鼠脊骨為末揩折處復生如故雌雄散雌雞糞雄雞糞舊麻鞋底三物等分燒為末入麝香少許摻折處一月生齒又方齒初落一枚則用布瓦焙為末典酒調服永不再落七鼻方人馬平安散治百病赤金二十張明雄二錢硃砂一錢五分硼砂一錢五分枯礬一錢良薑一錢朴硝五分蓽菝一個青鹽三分冰片二分麝香一分共為細末吹鼻中男左女右神愈散治肺熱鼻塞不聞香臭歌曰細辛白芷與防風羌活當歸半夏芎桔梗茯苓陳皮輩一般等分銼和同七分薄荷姜煎服氣息調勻鼻塞通治鼻血不止附子為末蒜搗如泥塗兩腳心自止又方生地一兩麥冬八錢元參五錢降香一錢五分水煎服又方茅根煎濃汁服即止或溫水洗腳即止八聲音方鐵笛丸治聲嘶失音生地一兩酒浸當歸二兩酒浸天冬五錢鹽炒麥冬五錢鹽炒黨參五錢蒸訶子肉五錢酒蒸知母五錢鹽炒阿膠五錢炒珠黃柏五錢蜜炙烏梅十五個共為細末外入人乳一杯牛乳一杯梨汁一杯煉蜜為丸如桐子大每服百丸蘿蔔湯下好音丸治同前杏仁炒去皮尖研極細末入豬脂一兩煉蜜丸如桐子大每服五七十丸米湯送下通音膏白蜜六兩核桃仁二兩冬花二兩川貝一兩共為細末和蜜成膏隨飯蒸熟每用三錢空心開水送服又方杏仁三兩炒去皮尖蘇子二兩炒百藥煎二兩訶子肉二兩煨共為細末每服三錢黃酒送下又方桔梗烏藥甘草烏梅等分水煎服又方生白礬煉蜜為丸開水送下九周身方香肌散兼治風癬當歸川芎羌活獨活白芷防風荊芥翻白草藿香細辛甘松藁本紅花皂角去皮弦煮水沐浴治癢癢疙瘩荊芥防風白芷川芎當歸白芍茜草蛇床子地骨皮川椒蒺藜透骨草苦參等分熬水沐浴又方金銀花地骨皮猴綿筋川椒熬水洗之德州肥皂方白芷三兩細辛七錢獨活五錢赤小豆五錢肥皂一斤共為細未和蜜為丸洗面洗澡皆可用之六香散二醜十兩皂角四兩去皮弦零陵香二兩天花粉二兩甘松二兩白芷二兩共為細末洗澡用之天香散藿香一兩五錢零陵香一兩甘松一兩桂心五錢紫蔻仁二兩益智仁一兩當歸六兩白芷六錢檳榔六錢丁香三錢木香三錢麝香五分共為細末煉蜜丸如桐子大空心噙化五七丸遍身皆香四香丸紫蔻仁冬瓜子去皮松樹皮去粗皮桂心共為細末煉蜜為丸如桐子大空心噙化五七丸遍身皆香輕身丸黃精切片九蒸九曬煉蜜為丸每服五錢三年可平飛過岸大力丸厚地黃九蒸九曬煉蜜為丸如桐子大每服三錢開水送下耐飢丸海松子九蒸九曬炒研為末去油煉蜜為丸如桐子大每服三錢溫酒送下久服不飢耐老丸柏子仁九蒸九曬炒研為末去油煉蜜為丸如桐子大每服三錢溫酒送下久服不老仙蓮丸七月七日採蓮花七兩八月八日採蓮根八兩九月九日採蓮子九兩陰放半乾砂鍋蒸熟曬乾研細末煉蜜為丸如桐子大每服三錢開水送下久服快志悅色延年不老伏桑丸桑葉伏天採取酒浸曬乾懷山藥黑芝麻藥黑豆四味各二斤共為細末入蜂蜜三斤和成塊每塊切一兩二錢共切二百塊用蓮葉墊定以籠蒸之每服一塊早晚空心鹽湯送下百日服完不可間斷有病服之百日全愈無病服之百病不生仙家服槐子方十月上已日收放新磁器中盛之以盆合其上密封其口勿令走氣三七二十一日開取去皮從月初一日服起一粒日加一粒至月半日少一粒周而復始上服令人夜看細書氣力百倍服藥豆方何首烏一兩肉蓯蓉八錢巴戟天六錢青鹽八錢破故紙六錢小茴香六錢藥黑豆三斤同入砂鍋煮透曬乾去藥食豆益氣力壯筋骨十茶酒方戒茶男用女女用男新鞋盛茶令滿任意喝盡再喝一鞋如此三度自不喝也戒酒好酒七斤硃砂五錢裝瓶內緊封瓶口放豬圈中任豬搖動七日取出頓飲又方蠐螬研細沖酒服之永不再飲百杯不醉葛根二兩白梅肉五錢葛花三錢薄荷二錢共為細末茶酒沖服皆可又方葛子三錢紫蔻仁三錢青果核三錢檳榔三錢共為細末煉蜜為丸噙舌下一杯醉倒無花果一個焙乾醉仙花一錢共為細末入酒杯內飲之即醉又方鵓鴿屎研細末入酒杯內飲之即醉引飲方葛根紫蔻丁香砂仁各五錢百藥煎甘草各二錢五分木瓜四兩炒鹽一兩共為細末溫酒調服一錢素不飲者亦能飲千里茶沙糖四兩薄荷四兩茯苓三兩甘草一兩共為細末煉蜜丸如棗大每噙化一丸行千里不渴假大煙高麗參一兩兒茶一兩潞黨參二兩天冬二兩麥冬二兩木蓮花一兩共合一處水煮三五滾用花尖紙過籠如熬煙法打泡進鬥則過癮十一雜方治男子怯弱天雄二枚細雄雞腸中搗爛蒸食之令人有勇禦寒湯炙黃耆三錢焦白朮二錢茯苓一錢五分廣皮一錢肉桂心八分五味子十五粒姜引水煎服避寒氣忘冷湯茯苓天冬等分共為細末溫酒和服每服三錢日二服雖大寒天亦出汗不冷治腋下狐臭先用自己小便洗一次又用米泔洗一次再用生薑汁頻塗除根縮陽丹水蛭九條入水碗養至七月七日取出陰乾稱有多少麝者蘇合三味等分研細末蜜和為餅陽興時用少許擦左腳心立刻陽縮過時復興再擦可也又方芒硝四兩兩手捧住任他流水陽自縮又方鮮絲瓜藤搗爛塗自莖自縮治夫婦不和鴛鴦肉作羹私與食之即恩愛和好又方五月五日取布穀鳥腳腦骨帶之亦恩愛和好治婦人忌姤天冬去心炒赤黍米炒薏苡仁炒等分共為細末水丸如桐子大每服五錢開水送下又方鴿鷓肉食之不忌姤治男子遺尿雄雞肝肉桂心等分同搗為丸如小豆大每服一丸米湯送下治婦人遺尿雄雞翎燒灰研細末溫酒和服治男婦尿床蔥頭七錢雄黃二錢同搗用布包臍上即不尿又方白紙一張鋪身下待尿紙上取出曬乾燒灰浸酒和服治小兒尿床龜尿滴臍中即不尿荷葉放盆內龜放荷葉上用鏡照龜見影自尿治小兒夜啼五倍子研細末津調填臍上即止畫眉膏令小兒斷乳雄黃二分雌黃二分硃砂二分麝香二分輕粉一分共為細末待小兒睡熟用香油調擦兩眉間及眉毛上即不思乳治小兒五歲不語赤小兒研細末酒和敷舌下十二足方軟足散白芷五錢防風五錢細辛二錢川芎二錢山奈二錢共為細末撒鞋底行路腳汗皆出香治腳汗蘿蔔湯洗之仍用枯礬末摻之治腳凍秋茄根熬湯洗之如破皮用螃蟹殼燒灰研末摻之治腳疼兼治肉刺雞眼黃丹枯礬朴硝等分為末炒蔥白和塗之穩步膏治雞眼地骨皮紅花等分為末塗之又方蜈蚣一錢焙硼砂一錢白礬共為細末香油浸埋土中十一月取出點之自落理腳散當歸一兩川芎五錢桂枝三錢牛膝一錢五分水煎溫服裹腳不疼又方當歸三錢牛膝二錢水煎空心服外用蕎麥稈煮湯加枯礬浸洗數次束腳散猴骨一兩枯礬一兩威靈仙六錢皮硝五錢川椒五錢熬水洗之瘦則易裹又方鳳仙科熬水洗腳軟則易裹又方茄柴一科蕎麥稈一把礞石三錢血竭三錢皮硝三錢沒藥三錢乳香一錢五分猴骨二錢熬水洗腳勿著手著手手亦小治行路腳疼草烏細辛官桂防風山奈等分共為細末襯鞋底十三救飢方黑豆一斤炒芝麻一斤炒江米一斤炒茯苓四兩共為細末用青布囊盛之每服三錢開水送下日三服不飢又方黃耆炙龍骨煅赤石脂各三錢烏頭炮防風各一錢同入石臼內搗一千杵煉蜜丸如彈子大每行路吃飽飯一頓服藥一丸可行五百里服藥二丸可行一千里又方芝麻江米炒研細末煮棗肉為丸如彈子大每服一丸一日不飢又方黑豆同鐵角風尾草蒸熟揀去草每服豆五七粒終日忘食十四諸傷方葦刺入肉栗子生嚼敷之即出竹刺入肉牛膝生嚼敷之即出竹木入肉老薑細嚼敷之即出又方羊屎燒灰豬脂和塗之即出針刺入肉車脂油攤紙上貼之二日一易三五次即出箭鏃入肉螻蛄腦同硫磺研細熬之覺癢即出又方頭上蝨子人牙同研塗之即出銃子入肉蜂蜜沖好酒飲醉即出鳥槍子入肉煮陳臘肉皮連膘揭下貼傷處看膘油化盡又換頻換數日即出十五諸蟲傷方蠍子蜇生半夏生南星生川烏生草烏白芷膽礬共為細末水調塗之毒蜂蜇生半夏生白礬研細末和醋塗之蠍虎咬桑葉燒灰水煎數沸濾濃汁和白礬末塗之蠶咬麝香和蜂蜜敷之蝸牛咬蓼子嚼汁敷之螻蛄咬醋和石灰敷之蚯蚓咬雞屎塗之或鹽水浸之蜈蚣咬雞冠血塗之或嚼胡椒塗之蜘蛛咬重者遍身生絲腹大如孕不治則死治法頻飲羊乳外用生薑汁調水粉塗之輕則香油和食鹽敷之毒蛇咬重則用雄黃五靈脂各五錢酒調服渣敷患處輕則用眉豆葉搗爛絞汁酒沖服渣敷患處蛇入七竅挽不出急以刀傷蛇尾納川椒胡椒三五粒裹著即出又以艾炙蛇尾即出後以雄黃末調人參湯服之解蛇毒凡卒為蛇繞不解以熱湯蕩之或令人尿之亦解八角蟲隱於壁內以尿射人生瘡如湯火傷烏雞翎燒灰雞蛋清調塗之或生犀角磨水塗之金蠶蟲南方有之能入人腹中毒者嚼白礬味甘嚼黑豆不腥是也石榴根皮煎濃汁服吐出活蟲即愈此蟲刺猥能捕獲應聲蟲在腹內隨人言語生薑汁一盞分五次服或青黛水調服飲油蟲頭髮入胃氣血裹化為蟲最喜飲油者是也雄黃五錢為末白水調服人咬先用童便飲之次用小米嚼爛敷之或龜版燒灰油調敷之馬咬馬齒莧煎湯飲之外嚼栗子敷之狗咬虎骨煅研末塗之或桑樹砍出自然汁塗之或嚼杏仁敷之瘋狗咬防風獨莖者良南星制七次曬乾殭蠶炒斷絲白芷等分共為細末每服三錢黃酒和童便服出汗自愈貓咬薄荷葉細嚼敷之鼠咬貓毛燒灰入麝香唾調敷之凡一切毒蟲咬傷內用白雞血熱飲之外用蛇蛻煎湯洗之凡瘋狗毒蛇咬傷急以新糞塗之好遲時用藥凡百蟲咬蜇宜於傷處上下扎縛使毒不走散食蒜飲酒令飽使毒不攻心或礬石甘草等分為末冷水調服三錢更搗蒜敷患處加艾灸之十六闢蟲方藏書闢蟲藝香燒煙燻之藏筆闢蟲黃柏川椒煎湯染之或硫黃研水浸之裱畫闢蟲生白礬川椒黃蠟共為細末入糊裱之或臘雪水打糊裱之床帳闢蟲長莖浮萍兩邊生葉者焙乾放床上燒煙燻之衣裳闢蟲野菊花三錢研細末水銀三錢白果三十枚同搗和勻漿衣裳用之又方端午日取蒿苣葉放匱箱內闢蟲毛衣闢蟲硼砂洗之氈衣闢蟲生芋擦之諸物闢蟲荸薺菜曬乾燒煙燻之點燈闢蟲荸薺菜梗作燈棒能闢蟲故荸薺菜一名護生草又方臘雪水浸燈草曬乾點之點燈闢鼠蟹中黃陰乾鱉甲藝香安息香共為細末焚於室中四壁其鼠自走闢蛇雞糞放上風頭燒之蛇自去闢蠅藁本煎湯浸抹布抹桌子並酒器蠅自去闢蚊子鱉甲藜蘆苦參川芎芫花楝花等分共為細末棗肉為丸曬乾點之又方夜明砂鱉甲等分為末燒煙燻之又方木鱉子雄黃川芎等分為末熏之闢臭蟲百部二兩藝香二兩鱉甲兩八白芷兩七甘草兩五雄黃兩二蛇床子一兩硫黃一兩浮萍一兩蟹殼十個木鱉子三十個共為細末入炭火內閉門燒煙燻之即出又方蜈蚣研細末燒煙燻之又方青鹽灌洗床帳臭蟲永絶其跡十七汙衣方墨汙衣生白果生半夏生杏仁搗爛擦之即去血汙衣蘿蔔細嚼擦之即去膿汙衣好酒滾熱擺之即去油汙衣石脂水調塗之即去桐油汙衣豆渣洗之即去漆汙衣先用油洗再用皂角擺之即去膠泥汙衣先用生薑拭過擺之即去膏藥汙衣米泔浸二日再用熱酒浸三五次清水擺之即去醬醋汙衣藕汁擦之即去大煙汙衣大煙柴淋灰火洗之即去瓜子仁嚼碎洗之即去蟲糞汙衣燈心蘸水擦之即去
