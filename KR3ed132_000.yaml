front:
  text: 序醫方拾錦者寒徑子游藝所輯也拾者何也東取也不曰取而曰拾者何也或因散失或因拋棄芥布星羅世多玩忽揉而集之盡歸有用是以謂之拾也錦者何也華物也言有花樣可採覽之呈以悅目也收詩之豔者擬比織錦詞之佩者此以錦繡安在醫方之豔珮者不可以錦名也是以根府歧黃博及百家正訂無訛搜羅幽隱勿能得此收拾之便綿方之精者收是集也善用則有益不善用亦無損也寒徑子簡練揣摩未求有功先求無過可知矣陳氏有拾遺馮氏有錦囊寒徑子想已洞晰其蘊拾錦之名吾未能窺其命意所在聊姑妄言之以為遊藝所輯然所否所同治癸酉一陽月陽生日云岩莫知之識大梁王風年敬書
